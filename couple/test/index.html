<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커플 유형 테스트 — 42world</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #1A2030; --gold: #B8860B; --gold-l: #D4A017;
  --silver: #8899AA; --bg: #0F121E; --card: #1A2030;
  --border: rgba(184,134,11,0.2);
}
body { font-family: 'Montserrat','Apple SD Gothic Neo',sans-serif; background: var(--bg); color: #E8E4DC; min-height: 100vh; }
.gnav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px;
  position: sticky; top: 0; z-index: 999;
  background: rgba(15,18,30,0.96); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.gnav-logo { font-size: 20px; font-weight: 900; letter-spacing: .04em; text-decoration: none; color: #D4A017; }
.gnav-logo span { color: #8899AA; font-weight: 300; font-size: 11px; letter-spacing: 2px; margin-left: 8px; }
.screen { display: none; }
.screen.active { display: block; }

/* ===== INTRO ===== */
#s-intro { padding: 60px 24px 80px; max-width: 480px; margin: 0 auto; text-align: center; }
.intro-badge { display: inline-block; background: rgba(184,134,11,0.15); border: 1px solid var(--border); color: #D4A017; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; }
.intro-title { font-size: 28px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 12px; }
.intro-sub { font-size: 14px; color: var(--silver); line-height: 1.7; margin-bottom: 40px; }
.name-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; text-align: left; }
.name-section h3 { font-size: 13px; color: var(--silver); font-weight: 700; letter-spacing: 1px; margin-bottom: 16px; }
.name-row { display: flex; gap: 12px; }
.name-field { flex: 1; }
.name-field label { display: block; font-size: 11px; color: var(--silver); font-weight: 700; margin-bottom: 6px; }
.name-field input {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; color: #E8E4DC; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color .2s;
}
.name-field input:focus { border-color: rgba(184,134,11,0.6); }
.name-field input::placeholder { color: rgba(136,153,170,0.5); }
.btn-start {
  width: 100%; padding: 18px; background: linear-gradient(135deg,#B8860B,#D4A017);
  border: none; border-radius: 14px; color: #0F121E; font-size: 16px; font-weight: 900;
  letter-spacing: .04em; cursor: pointer; transition: opacity .2s;
}
.btn-start:hover { opacity: .85; }
.intro-note { font-size: 12px; color: var(--silver); margin-top: 16px; line-height: 1.6; }

/* ===== QUESTION ===== */
#s-q { max-width: 640px; margin: 0 auto; padding: 24px 16px 80px; }
.progress-wrap { margin-bottom: 28px; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--silver); margin-bottom: 8px; }
.progress-bar { height: 4px; background: rgba(136,153,170,0.2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#B8860B,#D4A017); border-radius: 4px; transition: width .3s; }
.q-number { font-size: 12px; font-weight: 700; color: var(--gold-l); letter-spacing: 1px; margin-bottom: 10px; }
.q-text { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.5; margin-bottom: 8px; }
.q-hint { font-size: 12px; color: var(--silver); margin-bottom: 24px; }

/* Q1-12: A/B two columns */
.ab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ab-card {
  background: var(--card); border: 2px solid var(--border); border-radius: 14px;
  padding: 18px 16px; cursor: pointer; transition: all .2s; text-align: center;
}
.ab-card:hover { border-color: rgba(184,134,11,0.5); }
.ab-card.selected { border-color: #D4A017; background: rgba(184,134,11,0.12); }
.ab-label { font-size: 20px; font-weight: 900; color: #D4A017; margin-bottom: 6px; }
.ab-desc { font-size: 13px; color: rgba(232,228,220,0.8); line-height: 1.5; }

/* Q13-24: 4-step scale */
.scale-wrap { display: flex; flex-direction: column; gap: 10px; }
.scale-opt {
  display: flex; align-items: center; gap: 14px;
  background: var(--card); border: 2px solid var(--border); border-radius: 12px;
  padding: 14px 18px; cursor: pointer; transition: all .2s;
}
.scale-opt:hover { border-color: rgba(184,134,11,0.5); }
.scale-opt.selected { border-color: #D4A017; background: rgba(184,134,11,0.12); }
.scale-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; transition: all .2s; }
.scale-opt.selected .scale-dot { background: #D4A017; border-color: #D4A017; }
.scale-opt-text { font-size: 14px; color: rgba(232,228,220,0.9); line-height: 1.4; }
.scale-opt-text strong { color: #D4A017; }

.q-nav { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; }
.btn-prev {
  flex: 1; padding: 14px; background: rgba(184,134,11,0.08); border: 1px solid var(--border);
  border-radius: 12px; color: var(--silver); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.btn-prev:hover { color: #D4A017; border-color: rgba(184,134,11,0.4); }
.btn-next {
  flex: 2; padding: 14px; background: linear-gradient(135deg,#B8860B,#D4A017);
  border: none; border-radius: 12px; color: #0F121E; font-size: 14px; font-weight: 900; cursor: pointer; transition: opacity .2s;
}
.btn-next:disabled { opacity: .35; cursor: not-allowed; }
.btn-next:not(:disabled):hover { opacity: .85; }

/* ===== RESULT ===== */
#s-result { max-width: 560px; margin: 0 auto; padding: 40px 16px 80px; text-align: center; }
.result-badge { display: inline-flex; gap: 8px; margin-bottom: 20px; }
.type-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  background: rgba(184,134,11,0.15); border: 1px solid var(--border); color: #D4A017;
}
.result-combo { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--gold-l); font-weight: 700; margin-bottom: 12px; }
.result-hook { font-size: 14px; color: rgba(232,228,220,0.7); line-height: 1.7; margin-bottom: 32px; }
.result-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
.result-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 16px; text-align: left; }
.result-card-icon { font-size: 24px; margin-bottom: 8px; }
.result-card-title { font-size: 12px; font-weight: 700; color: var(--silver); letter-spacing: 1px; margin-bottom: 6px; }
.result-card-body { font-size: 13px; color: rgba(232,228,220,0.8); line-height: 1.6; }
.btn-detail {
  display: block; width: 100%; padding: 18px; margin-bottom: 12px;
  background: linear-gradient(135deg,#B8860B,#D4A017); border: none; border-radius: 14px;
  color: #0F121E; font-size: 16px; font-weight: 900; cursor: pointer; text-decoration: none;
  transition: opacity .2s;
}
.btn-detail:hover { opacity: .85; }
.btn-retry {
  display: block; width: 100%; padding: 14px;
  background: rgba(184,134,11,0.08); border: 1px solid var(--border); border-radius: 12px;
  color: var(--silver); font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
  transition: all .2s;
}
.btn-retry:hover { color: #D4A017; border-color: rgba(184,134,11,0.4); }
</style>
</head>
<body>

<nav class="gnav">
  <a class="gnav-logo" href="/">42world<span>BETWEEN</span></a>
</nav>

<!-- SCREEN 1: INTRO -->
<div id="s-intro" class="screen active">
  <div class="intro-badge">COUPLE TYPE TEST</div>
  <div class="intro-title">우리 커플은<br>어떤 유형일까?</div>
  <div class="intro-sub">두 사람의 이름을 입력하고<br>24개 질문에 함께 답해보세요.</div>

  <div class="name-section">
    <h3>이름 입력 (선택)</h3>
    <div class="name-row">
      <div class="name-field">
        <label>나 (A)</label>
        <input type="text" id="nameA" placeholder="예: 민철" maxlength="10">
      </div>
      <div class="name-field">
        <label>파트너 (B)</label>
        <input type="text" id="nameB" placeholder="예: 수연" maxlength="10">
      </div>
    </div>
  </div>

  <button class="btn-start" onclick="startTest()">검사 시작하기 →</button>
  <div class="intro-note">총 24문항 · 약 5분 소요 · 무료</div>
</div>

<!-- SCREEN 2: QUESTIONS -->
<div id="s-q" class="screen">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="q-counter">1 / 24</span>
      <span id="q-axis"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="q-body"></div>
  <div class="q-nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div id="s-result" class="screen">
  <div class="result-badge">
    <span class="type-chip" id="chip-a"></span>
    <span style="color:var(--silver);line-height:28px;">×</span>
    <span class="type-chip" id="chip-b"></span>
  </div>
  <div class="result-combo" id="result-combo"></div>
  <div class="result-sub" id="result-sub"></div>
  <div class="result-hook" id="result-hook"></div>
  <div class="result-cards">
    <div class="result-card">
      <div class="result-card-icon">⚡</div>
      <div class="result-card-title">긴장 포인트</div>
      <div class="result-card-body" id="result-tension"></div>
    </div>
    <div class="result-card">
      <div class="result-card-icon">✨</div>
      <div class="result-card-title">케미 포인트</div>
      <div class="result-card-body" id="result-magic"></div>
    </div>
  </div>
  <a id="btn-detail" class="btn-detail" href="#">심층 리포트 보기 →</a>
  <a class="btn-retry" href="/couple/test/">다시 테스트하기</a>
</div>

  'LOGIC×LEADER':  {title:'전략 동맹',   sub:'최고의 지적 파트너 커플',           hook:'LOGIC의 분석과 LEADER의 실행이 만나면 최강이에요.',              tension:'누가 옳은지를 두고 논쟁이 격해질 수 있어요', magic:'두 사람이 합치면 어떤 문제도 풀 수 있음'},
  'LEADER×SPARK':  {title:'엔진과 비전', sub:'꿈을 현실로 만드는 드림팀 커플',    hook:'SPARK가 가능성을 그리면 LEADER가 실행 계획을 세워요.',            tension:'리더십 충돌, 누가 이끌지 싸울 수 있어요', magic:'두 사람이 함께라면 못 이룰 목표가 없음'},
  'LEADER×VISION': {title:'전략 파트너', sub:'장기 목표를 함께 그리는 커플',      hook:'VISION의 통찰을 LEADER가 전략으로 만들어요.',                     tension:'LEADER의 실행 압박이 VISION을 지치게 할 수 있어요', magic:'가장 강력한 장기 파트너십'},
  'LEADER×STEADY': {title:'성과와 실행', sub:'계획을 완벽하게 실행하는 커플',     hook:'LEADER가 방향을 잡고 STEADY가 끝까지 실행해요.',                 tension:'LEADER가 너무 빠르게 몰아붙여 STEADY가 지칠 수 있어요', magic:'세운 목표는 반드시 이루는 커플'},
  'LEADER×PLAYER': {title:'방향과 에너지', sub:'활기차게 목표를 향해 달리는 커플', hook:'PLAYER의 에너지를 LEADER가 올바른 방향으로 이끌어요.',           tension:'LEADER의 통제욕이 PLAYER의 자유를 억누를 수 있어요', magic:'가장 빠르고 역동적으로 목표를 달성하는 커플'},
  'LEADER×HARMONY': {title:'전략과 마음', sub:'따뜻한 카리스마의 커플',           hook:'LEADER의 방향감각에 HARMONY의 인간적 따뜻함이 더해져요.',         tension:'LEADER가 너무 목표 지향적일 때 HARMONY가 지칠 수 있어요', magic:'사람을 움직이는 리더십을 함께 만들어냄'},
  'LEADER×SOUL':   {title:'목표와 가치', sub:'의미와 성과를 함께 추구하는 커플',  hook:'SOUL의 깊은 가치관이 LEADER의 방향에 의미를 더해요.',             tension:'LEADER의 성과 중심이 SOUL을 지치게 할 수 있어요', magic:'가장 의미 있는 일을 함께 만들어가는 커플'},
  'LEADER×LOGIC':  {title:'전략 동맹',   sub:'최고의 지적 파트너 커플',           hook:'LOGIC의 분석과 LEADER의 실행이 만나면 최강이에요.',              tension:'누가 옳은지를 두고 논쟁이 격해질 수 있어요', magic:'두 사람이 합치면 어떤 문제도 풀 수 있음'},
  'LEADER×LEADER': {title:'더블 리더',   sub:'함께 세상을 바꾸는 커플',           hook:'두 리더가 만났어요. 엄청난 에너지지만, 방향이 같아야 해요.',      tension:'누가 결정권을 갖는지를 두고 충돌이 클 수 있어요', magic:'두 사람이 합을 맞추면 세상 어떤 목표도 이룰 수 있음'}
};

// ===== STATE =====
var state = {
  nameA: '나', nameB: '파트너',
  curQ: 0,
  answers: Array(24).fill(null),
  typeA: '', typeB: ''
};

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ===== START =====
function startTest() {
  var nA = document.getElementById('nameA').value.trim();
  var nB = document.getElementById('nameB').value.trim();
  state.nameA = nA || '나';
  state.nameB = nB || '파트너';
  state.curQ = 0;
  state.answers = Array(24).fill(null);
  showScreen('s-q');
  renderQ();
}

// ===== RENDER QUESTION =====
function renderQ() {
  var i = state.curQ;
  var q = QUESTIONS[i];
  var pct = Math.round((i / 24) * 100);
  var axisLabel = {EI:'에너지 방향', SN:'정보 인식', TF:'판단 기준', JP:'생활 방식'}[q.axis];

  document.getElementById('q-counter').textContent = (i+1) + ' / 24';
  document.getElementById('q-axis').textContent = axisLabel;
  document.getElementById('progress-fill').style.width = pct + '%';

  var isAB = i < 12;
  var html = '';
  html += '<div class="q-number">Q' + q.n + '</div>';
  html += '<div class="q-text">' + q.text + '</div>';

  if (isAB) {
    html += '<div class="q-hint">두 사람의 공통 성향을 선택해주세요</div>';
    html += '<div class="ab-grid">';
    html += '<div class="ab-card' + (state.answers[i] === 0 ? ' selected' : '') + '" onclick="selectAB(0)">';
    html += '<div class="ab-label">A</div><div class="ab-desc">' + q.a + '</div></div>';
    html += '<div class="ab-card' + (state.answers[i] === 1 ? ' selected' : '') + '" onclick="selectAB(1)">';
    html += '<div class="ab-label">B</div><div class="ab-desc">' + q.b + '</div></div>';
    html += '</div>';
  } else {
    html += '<div class="q-hint">' + state.nameA + '와 ' + state.nameB + ' 중 누가 더 어느 쪽에 가까운가요?</div>';
    var opts = [
      {label: '<strong>' + state.nameA + '</strong>에 가까워요 (확실히)', val: 0},
      {label: '약간 <strong>' + state.nameA + '</strong>에 가까워요', val: 1},
      {label: '약간 <strong>' + state.nameB + '</strong>에 가까워요', val: 2},
      {label: '<strong>' + state.nameB + '</strong>에 가까워요 (확실히)', val: 3}
    ];
    html += '<div class="scale-wrap">';
    opts.forEach(function(opt) {
      html += '<div class="scale-opt' + (state.answers[i] === opt.val ? ' selected' : '') + '" onclick="selectScale(' + opt.val + ')">';
      html += '<div class="scale-dot"></div>';
      html += '<div class="scale-opt-text">' + opt.label + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('q-body').innerHTML = html;
  document.getElementById('btn-prev').disabled = (i === 0);
  document.getElementById('btn-next').disabled = (state.answers[i] === null);
  document.getElementById('btn-next').textContent = (i === 23) ? '결과 보기 →' : '다음 →';
}

function selectAB(val) {
  state.answers[state.curQ] = val;
  renderQ();
  if (state.curQ < 23) {
    setTimeout(function() { nextQ(); }, 300);
  }
}

function selectScale(val) {
  state.answers[state.curQ] = val;
  renderQ();
}

function nextQ() {
  if (state.answers[state.curQ] === null) return;
  if (state.curQ === 23) { calcResult(); return; }
  state.curQ++;
  renderQ();
}

function prevQ() {
  if (state.curQ === 0) return;
  state.curQ--;
  renderQ();
}

// ===== CALC RESULT =====
function calcResult() {
  // Q1-12: A/B answers → both people get same axis score
  // A=0 means first option (e.g. E for EI), B=1 means second option (e.g. I for EI)
  var scoreA = {EI:0, SN:0, TF:0, JP:0};
  var scoreB = {EI:0, SN:0, TF:0, JP:0};

  // Q1-6: EI (A=E positive, B=I)
  for (var i=0; i<6; i++) {
    var v = state.answers[i] === 0 ? 1 : -1; // A=E(+), B=I(-)
    scoreA.EI += v; scoreB.EI += v;
  }
  // Q7-12: SN (A=S, B=N)
  for (var i=6; i<12; i++) {
    var v = state.answers[i] === 0 ? 1 : -1; // A=S(+), B=N(-)
    scoreA.SN += v; scoreB.SN += v;
  }
  // Q13-18: TF (4-step scale: 0=A확실히, 1=A약간, 2=B약간, 3=B확실히)
  // For A: 0→+2, 1→+1, 2→-1, 3→-2  (positive=T)
  // For B: opposite
  for (var i=12; i<18; i++) {
    var v = state.answers[i];
    var scoreAv, scoreBv;
    if (v === 0) { scoreAv = 2; scoreBv = -2; }
    else if (v === 1) { scoreAv = 1; scoreBv = -1; }
    else if (v === 2) { scoreAv = -1; scoreBv = 1; }
    else { scoreAv = -2; scoreBv = 2; }
    scoreA.TF += scoreAv; scoreB.TF += scoreBv;
  }
  // Q19-24: JP (A=J positive, B=P)
  for (var i=18; i<24; i++) {
    var v = state.answers[i];
    var scoreAv, scoreBv;
    if (v === 0) { scoreAv = 2; scoreBv = -2; }
    else if (v === 1) { scoreAv = 1; scoreBv = -1; }
    else if (v === 2) { scoreAv = -1; scoreBv = 1; }
    else { scoreAv = -2; scoreBv = 2; }
    scoreA.JP += scoreAv; scoreB.JP += scoreBv;
  }

  function toMBTI(s) {
    return (s.EI >= 0 ? 'E' : 'I') + (s.SN >= 0 ? 'S' : 'N') + (s.TF >= 0 ? 'T' : 'F') + (s.JP >= 0 ? 'J' : 'P');
  }

  var mbtiA = toMBTI(scoreA);
  var mbtiB = toMBTI(scoreB);
  state.typeA = TYPE_MAP[mbtiA] || 'SPARK';
  state.typeB = TYPE_MAP[mbtiB] || 'SPARK';

  showResult();
}

function showResult() {
  var tA = state.typeA, tB = state.typeB;
  var key = tA + '×' + tB;
  var combo = COMBOS[key] || COMBOS[tB + '×' + tA] || {
    title: tA + ' × ' + tB,
    sub: '독특한 조합의 커플',
    hook: '두 사람만의 특별한 케미가 있어요.',
    tension: '서로의 차이를 이해하는 시간이 필요해요',
    magic: '다름이 서로를 더 완전하게 만들어줘요'
  };

  document.getElementById('chip-a').textContent = state.nameA + ' · ' + tA;
  document.getElementById('chip-b').textContent = state.nameB + ' · ' + tB;
  document.getElementById('result-combo').textContent = combo.title;
  document.getElementById('result-sub').textContent = combo.sub;
  document.getElementById('result-hook').textContent = combo.hook;
  document.getElementById('result-tension').textContent = combo.tension;
  document.getElementById('result-magic').textContent = combo.magic;

  var detailUrl = '/couple/result/?a=' + tA + '&b=' + tB;
  document.getElementById('btn-detail').href = detailUrl;

  showScreen('s-result');
}
</script>
