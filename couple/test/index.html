<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커플 유형 테스트 — 42world</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0F121E; --card: #1A2030;
  --gold: #B8860B; --gold-l: #D4A017;
  --silver: #8899AA; --text: #E8E4DC;
  --border: rgba(184,134,11,0.2);
}
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
.nav { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; background:rgba(15,18,30,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:99; }
.nav a { color:var(--gold-l); font-weight:900; font-size:17px; text-decoration:none; }

/* SCREENS */
.screen { display:none; }
.screen.on { display:block; }

/* ── INTRO ── */
#s-intro { max-width:460px; margin:0 auto; padding:56px 20px 80px; text-align:center; }
.badge { display:inline-block; background:rgba(184,134,11,0.12); border:1px solid var(--border); color:var(--gold-l); font-size:11px; font-weight:700; letter-spacing:2px; padding:5px 14px; border-radius:20px; margin-bottom:22px; }
.intro-title { font-size:28px; font-weight:900; color:#fff; line-height:1.3; margin-bottom:10px; }
.intro-desc { font-size:14px; color:var(--silver); line-height:1.7; margin-bottom:36px; }
.name-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; margin-bottom:22px; text-align:left; }
.name-box h3 { font-size:12px; color:var(--silver); font-weight:700; letter-spacing:1px; margin-bottom:14px; }
.name-row { display:flex; gap:12px; }
.name-field { flex:1; }
.name-field label { display:block; font-size:11px; color:var(--silver); margin-bottom:5px; }
.name-field input { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color .2s; }
.name-field input:focus { border-color:rgba(184,134,11,0.5); }
.name-field input::placeholder { color:rgba(136,153,170,0.4); }
.btn-go { width:100%; padding:17px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:13px; color:#0F121E; font-size:16px; font-weight:900; cursor:pointer; transition:opacity .2s; }
.btn-go:hover { opacity:.85; }
.intro-note { font-size:12px; color:var(--silver); margin-top:12px; }

/* ── QUESTION ── */
#s-q { max-width:600px; margin:0 auto; padding:24px 20px 80px; }
.prog-info { display:flex; justify-content:space-between; font-size:12px; color:var(--silver); margin-bottom:8px; }
.prog-bar { height:4px; background:rgba(136,153,170,0.15); border-radius:4px; overflow:hidden; margin-bottom:28px; }
.prog-fill { height:100%; background:linear-gradient(90deg,#B8860B,#D4A017); border-radius:4px; transition:width .3s; }
.q-num { font-size:11px; font-weight:700; color:var(--gold-l); letter-spacing:1px; margin-bottom:8px; }
.q-text { font-size:18px; font-weight:700; color:#fff; line-height:1.45; margin-bottom:7px; }
.q-hint { font-size:12px; color:var(--silver); margin-bottom:22px; line-height:1.5; }

/* A/B cards */
.ab-wrap { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:8px; }
.ab-card { background:var(--card); border:2px solid var(--border); border-radius:14px; padding:18px 14px; cursor:pointer; text-align:center; transition:border-color .15s, background .15s; user-select:none; }
.ab-card:hover { border-color:rgba(184,134,11,0.45); }
.ab-card.sel { border-color:var(--gold-l); background:rgba(184,134,11,0.1); }
.ab-lbl { font-size:22px; font-weight:900; color:var(--gold-l); margin-bottom:6px; }
.ab-txt { font-size:13px; color:rgba(232,228,220,0.85); line-height:1.5; }

/* Scale options */
.scale-wrap { display:flex; flex-direction:column; gap:9px; margin-bottom:8px; }
.sc-opt { display:flex; align-items:center; gap:14px; background:var(--card); border:2px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:border-color .15s, background .15s; user-select:none; }
.sc-opt:hover { border-color:rgba(184,134,11,0.45); }
.sc-opt.sel { border-color:var(--gold-l); background:rgba(184,134,11,0.1); }
.sc-dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; transition:background .15s, border-color .15s; }
.sc-opt.sel .sc-dot { background:var(--gold-l); border-color:var(--gold-l); }
.sc-txt { font-size:14px; color:rgba(232,228,220,0.9); line-height:1.4; }
.sc-txt strong { color:var(--gold-l); }

.q-nav { display:flex; gap:10px; margin-top:24px; }
.btn-prev { flex:1; padding:13px; background:rgba(184,134,11,0.07); border:1px solid var(--border); border-radius:11px; color:var(--silver); font-size:14px; font-weight:700; cursor:pointer; transition:color .2s; }
.btn-prev:hover { color:var(--gold-l); }
.btn-next { flex:2; padding:13px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:11px; color:#0F121E; font-size:14px; font-weight:900; cursor:pointer; transition:opacity .2s; }
.btn-next:disabled { opacity:.3; cursor:default; }

/* ── RESULT ── */
#s-result { max-width:520px; margin:0 auto; padding:44px 20px 80px; text-align:center; }
.chips { display:inline-flex; gap:8px; margin-bottom:18px; }
.chip { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:700; background:rgba(184,134,11,0.12); border:1px solid var(--border); color:var(--gold-l); }
.res-title { font-size:26px; font-weight:900; color:#fff; margin-bottom:5px; }
.res-sub { font-size:14px; color:var(--gold-l); font-weight:700; margin-bottom:10px; }
.res-hook { font-size:14px; color:rgba(232,228,220,0.7); line-height:1.75; margin-bottom:30px; }
.res-cards { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:30px; }
.res-card { background:var(--card); border:1px solid var(--border); border-radius:13px; padding:18px 14px; text-align:left; }
.res-card-ico { font-size:22px; margin-bottom:7px; }
.res-card-lbl { font-size:11px; font-weight:700; color:var(--silver); letter-spacing:1px; margin-bottom:5px; }
.res-card-txt { font-size:13px; color:rgba(232,228,220,0.8); line-height:1.6; }
.btn-detail { display:block; padding:17px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:13px; color:#0F121E; font-size:16px; font-weight:900; text-decoration:none; margin-bottom:10px; cursor:pointer; transition:opacity .2s; }
.btn-detail:hover { opacity:.85; }
.btn-retry { display:block; padding:13px; background:rgba(184,134,11,0.07); border:1px solid var(--border); border-radius:11px; color:var(--silver); font-size:14px; font-weight:700; text-decoration:none; cursor:pointer; transition:color .2s; }
.btn-retry:hover { color:var(--gold-l); }
</style>
</head>
<body>

<nav class="nav"><a href="/">42world</a></nav>

<!-- ① 이름 입력 -->
<div id="s-intro" class="screen on">
  <div class="badge">COUPLE TEST</div>
  <div class="intro-title">우리 커플<br>유형 테스트</div>
  <div class="intro-desc">두 사람의 이름을 입력하고<br>24문항에 함께 답해보세요.</div>
  <div class="name-box">
    <h3>이름 입력 (선택)</h3>
    <div class="name-row">
      <div class="name-field">
        <label>나 (A)</label>
        <input id="nameA" type="text" placeholder="예: 민철" maxlength="8">
      </div>
      <div class="name-field">
        <label>파트너 (B)</label>
        <input id="nameB" type="text" placeholder="예: 수연" maxlength="8">
      </div>
    </div>
  </div>
  <button class="btn-go" onclick="startTest()">검사 시작하기 →</button>
  <div class="intro-note">24문항 · 약 5분 · 무료</div>
</div>

<!-- ② 문항 -->
<div id="s-q" class="screen">
  <div class="prog-info">
    <span id="p-count">1 / 24</span>
    <span id="p-axis"></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="p-fill" style="width:0%"></div></div>
  <div id="q-body"></div>
  <div class="q-nav">
    <button class="btn-prev" id="b-prev" onclick="prevQ()">← 이전</button>
    <button class="btn-next" id="b-next" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<!-- ③ 결과 -->
<div id="s-result" class="screen">
  <div class="chips">
    <span class="chip" id="chip-a"></span>
    <span style="color:var(--silver);line-height:26px;font-size:13px;">×</span>
    <span class="chip" id="chip-b"></span>
  </div>
  <div class="res-title" id="r-title"></div>
  <div class="res-sub" id="r-sub"></div>
  <div class="res-hook" id="r-hook"></div>
  <div class="res-cards">
    <div class="res-card"><div class="res-card-ico">⚡</div><div class="res-card-lbl">긴장 포인트</div><div class="res-card-txt" id="r-tension"></div></div>
    <div class="res-card"><div class="res-card-ico">✨</div><div class="res-card-lbl">케미 포인트</div><div class="res-card-txt" id="r-magic"></div></div>
  </div>
  <a id="r-link" class="btn-detail" href="#">심층 리포트 보기 →</a>
  <a class="btn-retry" href="/couple/test/">다시 테스트하기</a>
</div>

// ───────── STATE ─────────
var S = {
  nameA:'나', nameB:'파트너',
  cur:0,
  ans: new Array(24).fill(null)
};

// ───────── UTIL ─────────
function show(id) {
  document.querySelectorAll('.screen').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

// ───────── START ─────────
function startTest() {
  S.nameA = document.getElementById('nameA').value.trim() || '나';
  S.nameB = document.getElementById('nameB').value.trim() || '파트너';
  S.cur = 0;
  S.ans = new Array(24).fill(null);
  show('s-q');
  render();
}

// ───────── RENDER ─────────
function render() {
  var i = S.cur;
  var q = QS[i];
  var isAB = i < 12;

  document.getElementById('p-count').textContent = (i+1) + ' / 24';
  document.getElementById('p-axis').textContent = AXIS_LABEL[q.ax];
  document.getElementById('p-fill').style.width = Math.round(i/24*100) + '%';

  var html = '<div class="q-num">Q' + q.n + ' · ' + AXIS_LABEL[q.ax] + '</div>';
  html += '<div class="q-text">' + q.q + '</div>';

  if (isAB) {
    html += '<div class="q-hint">두 사람의 공통 성향을 하나 선택해주세요</div>';
    html += '<div class="ab-wrap">';
    html += '<div class="ab-card' + (S.ans[i]===0?' sel':'') + '" onclick="pickAB(0)"><div class="ab-lbl">A</div><div class="ab-txt">' + q.a + '</div></div>';
    html += '<div class="ab-card' + (S.ans[i]===1?' sel':'') + '" onclick="pickAB(1)"><div class="ab-lbl">B</div><div class="ab-txt">' + q.b + '</div></div>';
    html += '</div>';
  } else {
    html += '<div class="q-hint">' + S.nameA + '와 ' + S.nameB + ' 중 누가 더 A에 가깝고 B에 가까운가요?</div>';
    var opts = [
      {v:0, txt:'<strong>' + S.nameA + '</strong>에 가까워요 (확실히)'},
      {v:1, txt:'약간 <strong>' + S.nameA + '</strong>에 가까워요'},
      {v:2, txt:'약간 <strong>' + S.nameB + '</strong>에 가까워요'},
      {v:3, txt:'<strong>' + S.nameB + '</strong>에 가까워요 (확실히)'}
    ];
    html += '<div class="scale-wrap">';
    opts.forEach(function(o){
      html += '<div class="sc-opt' + (S.ans[i]===o.v?' sel':'') + '" onclick="pickSC(' + o.v + ')"><div class="sc-dot"></div><div class="sc-txt">' + o.txt + '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('q-body').innerHTML = html;
  document.getElementById('b-prev').disabled = (i === 0);
  var nxt = document.getElementById('b-next');
  nxt.disabled = (S.ans[i] === null);
  nxt.textContent = (i === 23) ? '결과 보기 →' : '다음 →';
}

function pickAB(v) {
  S.ans[S.cur] = v;
  render();
  if (S.cur < 23) { setTimeout(nextQ, 280); }
}

function pickSC(v) {
  S.ans[S.cur] = v;
  render();
}

function nextQ() {
  if (S.ans[S.cur] === null) return;
  if (S.cur === 23) { calc(); return; }
  S.cur++;
  render();
}

function prevQ() {
  if (S.cur === 0) return;
  S.cur--;
  render();
}

// ───────── CALC ─────────
function calc() {
  var sA = {EI:0,SN:0,TF:0,JP:0};
  var sB = {EI:0,SN:0,TF:0,JP:0};

  // Q1-6 EI: A=E(+1) B=I(-1) — 두 사람 공통
  for (var i=0;i<6;i++) { var v=S.ans[i]===0?1:-1; sA.EI+=v; sB.EI+=v; }
  // Q7-12 SN: A=S(+1) B=N(-1) — 두 사람 공통
  for (var i=6;i<12;i++) { var v=S.ans[i]===0?1:-1; sA.SN+=v; sB.SN+=v; }
  // Q13-18 TF: 4단계 (0=A확실+2, 1=A약간+1, 2=B약간, 3=B확실) A=T(+), B=F(-)
  for (var i=12;i<18;i++) {
    var v=S.ans[i]; var a2,b2;
    if(v===0){a2=2;b2=-2;}else if(v===1){a2=1;b2=-1;}else if(v===2){a2=-1;b2=1;}else{a2=-2;b2=2;}
    sA.TF+=a2; sB.TF+=b2;
  }
  // Q19-24 JP: 4단계 A=J(+), B=P(-)
  for (var i=18;i<24;i++) {
    var v=S.ans[i]; var a2,b2;
    if(v===0){a2=2;b2=-2;}else if(v===1){a2=1;b2=-1;}else if(v===2){a2=-1;b2=1;}else{a2=-2;b2=2;}
    sA.JP+=a2; sB.JP+=b2;
  }

  function mbti(s){ return (s.EI>=0?'E':'I')+(s.SN>=0?'S':'N')+(s.TF>=0?'T':'F')+(s.JP>=0?'J':'P'); }
  var tA = TYPE_MAP[mbti(sA)] || 'SPARK';
  var tB = TYPE_MAP[mbti(sB)] || 'SPARK';
  showResult(tA, tB);
}

// ───────── RESULT ─────────
function showResult(tA, tB) {
  var key = tA + '×' + tB;
  var c = COMBOS[key] || COMBOS[tB+'×'+tA] || {
    title: tA+' × '+tB, sub:'특별한 조합의 커플',
    hook:'두 사람만의 고유한 케미가 있어요.',
    tension:'서로의 차이를 이해하는 시간이 필요해요',
    magic:'다름이 서로를 더 완전하게 만들어줘요'
  };

  document.getElementById('chip-a').textContent = S.nameA + ' · ' + tA;
  document.getElementById('chip-b').textContent = S.nameB + ' · ' + tB;
  document.getElementById('r-title').textContent = c.title;
  document.getElementById('r-sub').textContent = c.sub;
  document.getElementById('r-hook').textContent = c.hook;
  document.getElementById('r-tension').textContent = c.tension;
  document.getElementById('r-magic').textContent = c.magic;
  document.getElementById('r-link').href = '/couple/result/?a='+tA+'&b='+tB;

  show('s-result');
}
</script>
