<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>내 세션 찾기 — 42world</title>
<style>
:root{
  --dark:#1A2030; --gold:#B8860B; --gold-l:#D4A017; --silver:#8899AA;
  --bg:#F7F5F0; --card:#FFFFFF; --text:#2A2F3A; --muted:#6B7280;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
.wrap{max-width:560px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:28px 24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04);margin-bottom:14px}
.brand{text-align:center;font-size:13px;letter-spacing:2px;color:var(--gold);
  font-weight:600;margin-bottom:16px}
h1{font-size:22px;margin:0 0 6px;color:var(--dark);text-align:center}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6}
label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px}
input{width:100%;padding:12px 14px;border:1.5px solid #D0D4DC;border-radius:8px;
  font-size:15px;outline:none}
input:focus{border-color:var(--gold)}
.btn{display:block;width:100%;padding:13px;margin-top:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  text-decoration:none;text-align:center}
.btn.secondary{background:#fff;color:var(--dark);border:1.5px solid #D0D4DC}
.btn.small{font-size:13px;padding:10px;margin-top:0}
.session-item{padding:18px 16px;border-radius:12px;background:#fff;
  border:1px solid rgba(0,0,0,0.06);margin-bottom:12px}
.session-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.combo{font-size:18px;font-weight:700;color:var(--dark)}
.status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
.status.paid{background:#D4EDDA;color:#155724}
.status.both_done{background:#FFF3CD;color:#856404}
.status.awaiting{background:#E2E3E5;color:#383D41}
.meta{font-size:12px;color:var(--muted);margin-bottom:10px}
.empty{text-align:center;color:var(--muted);padding:30px 0;font-size:14px}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card-input">
    <div class="brand">✦ 42WORLD × SHADOWGRAM ✦</div>
    <h1>내 세션 찾기</h1>
    <p class="sub">검사 때 입력한 이메일을 넣으면<br>
      진행 중인 세션과 구매한 리포트를 볼 수 있어요.</p>
    <label for="email">이메일 주소</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    <button class="btn" id="btn-search">세션 찾기 →</button>
  </div>

  <div id="results" style="display:none">
    <div class="card">
      <h1 style="margin-bottom:14px">내 세션 목록</h1>
      <div id="list"></div>
    </div>
  </div>
</div>
<div class="footer">문의: 42world.kr</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/couple/js/supabase-client.js"></script>
<script src="/couple/js/session.js"></script>
<script>
document.getElementById('btn-search').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim().toLowerCase();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert('이메일 형식이 올바르지 않아요.'); return;
  }
  try {
    const items = await SG.session.findSessionsByEmail(email);
    const $list = document.getElementById('list');
    $list.innerHTML = '';
    if (items.length === 0) {
      $list.innerHTML = '<div class="empty">이 이메일로 진행한 세션이 없어요.<br>오타가 없는지 확인하거나, 새로 시작해보세요.</div>';
    } else {
      items.forEach(({session, my_role}) => {
        const div = document.createElement('div');
        div.className = 'session-item';

        const combo = session.combo || '—';
        const statusMap = {
          paid: '<span class="status paid">결제완료</span>',
          both_done: '<span class="status both_done">결제 대기</span>',
          awaiting_partner: '<span class="status awaiting">파트너 대기</span>',
          pending: '<span class="status awaiting">진행 중</span>',
        };
        const dateStr = new Date(session.created_at).toLocaleDateString('ko-KR');

        let action = '';
        if (session.payment_status === 'paid') {
          action = `<a class="btn small" href="/couple/kr/download/?session=${session.id}&email=${encodeURIComponent(email)}">📥 리포트 다운로드</a>`;
        } else if (session.status === 'both_done') {
          action = `<a class="btn small" href="/couple/kr/download/?session=${session.id}&email=${encodeURIComponent(email)}">💳 결제하고 받기</a>`;
        } else if (session.status === 'awaiting_partner') {
          action = `<a class="btn small secondary" href="/couple/kr/pending/?session=${session.id}">⏳ 파트너 대기 중</a>`;
        }

        div.innerHTML = `
          <div class="session-row">
            <div class="combo">${combo.replace('_',' × ')}</div>
            ${statusMap[session.status] || ''}
          </div>
          <div class="meta">생성일: ${dateStr} · 역할: ${my_role}</div>
          ${action}
        `;
        $list.appendChild(div);
      });
    }
    document.getElementById('results').style.display = 'block';
    document.getElementById('card-input').style.display = 'none';
  } catch (e) {
    console.error(e);
    alert('조회 중 오류가 발생했어요.');
  }
});
</script>
</body>
</html>
