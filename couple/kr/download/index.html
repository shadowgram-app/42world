<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>리포트 다운로드 — 42world</title>
<style>
:root{
  --dark:#1A2030; --gold:#B8860B; --gold-l:#D4A017; --silver:#8899AA;
  --bg:#F7F5F0; --card:#FFFFFF; --text:#2A2F3A; --muted:#6B7280;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:520px;width:100%}
.card{background:var(--card);border-radius:16px;padding:32px 24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04)}
.brand{text-align:center;font-size:13px;letter-spacing:2px;color:var(--gold);
  font-weight:600;margin-bottom:16px}
h1{text-align:center;font-size:22px;margin:0 0 8px;color:var(--dark)}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}
.combo-display{text-align:center;font-size:26px;font-weight:700;color:var(--gold);
  margin:16px 0;letter-spacing:1px}
label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px;margin-top:14px}
input{width:100%;padding:12px 14px;border:1.5px solid #D0D4DC;border-radius:8px;
  font-size:15px;outline:none}
input:focus{border-color:var(--gold)}
.btn{display:block;width:100%;padding:14px;margin-top:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 8px rgba(184,134,11,0.3);text-decoration:none;text-align:center}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn.secondary{background:#fff;color:var(--dark);border:1.5px solid #D0D4DC;box-shadow:none}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
.err{background:#FEF2F2;color:#991B1B;padding:12px;border-radius:8px;
  font-size:13px;margin-top:12px;line-height:1.5;white-space:pre-line}
.loading{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #EFE8D5;
  border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;
  vertical-align:middle;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-banner{padding:12px;border-radius:8px;text-align:center;font-size:13px;
  font-weight:600;margin-bottom:14px}
.state-banner.ready{background:#D4EDDA;color:#155724}
.state-banner.pay{background:#FFF3CD;color:#856404}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">✦ 42WORLD × SHADOWGRAM ✦</div>

    <!-- 로딩 -->
    <div id="state-loading" class="loading">
      <div><span class="spinner"></span>확인 중...</div>
    </div>

    <!-- 이메일 입력 (기본) -->
    <div id="state-input" style="display:none">
      <div class="state-banner pay">결제해주셔서 감사합니다 💛</div>
      <h1>이메일로 리포트 받기</h1>
      <p class="sub">결제 시 사용한 이메일(=검사 때 입력한 이메일)을 입력해주시면<br>
        24페이지 심층 리포트를 바로 다운로드해드려요.</p>

      <label for="email">이메일 주소</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">

      <button class="btn" id="btn-get">📥 리포트 받기</button>
      <div class="err" id="err" style="display:none"></div>

      <div class="hint">아직 결제를 안 하셨나요? <a href="/couple/kr/my/" style="color:var(--gold);text-decoration:none;font-weight:700;">이메일로 내 세션 찾기 →</a></div>
    </div>

    <!-- 다운로드 진행 -->
    <div id="state-paid" style="display:none">
      <div class="state-banner ready">✓ 리포트 준비 완료</div>
      <h1>리포트가 다운로드됐어요 📄</h1>
      <div class="combo-display" id="combo-display">—</div>
      <p class="sub">다운로드가 자동으로 시작되지 않았다면<br>아래 버튼을 눌러주세요.</p>
      <button class="btn" id="btn-redownload">📥 다시 다운로드</button>
      <a class="btn secondary" href="/couple/kr/my/">내 다른 세션 보기</a>
      <div class="err" id="err-paid" style="display:none"></div>
    </div>

    <!-- 에러 -->
    <div id="state-error" style="display:none">
      <h1>안내</h1>
      <p class="sub" id="error-detail">—</p>
      <a class="btn" href="/couple/kr/my/">이메일로 내 세션 찾기</a>
      <a class="btn secondary" href="/couple/test/">새로 검사 시작</a>
    </div>
  </div>
  <div class="footer">문의: 42world.kr</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/couple/js/supabase-client.js"></script>
<script src="/couple/js/session.js"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const sessionIdParam = params.get('session');
  const emailParam = params.get('email');

  const $states = ['loading','input','paid','error'].reduce((a,k)=>{a[k]=document.getElementById('state-'+k);return a},{});
  function show(k){ Object.values($states).forEach(el=>el.style.display='none'); $states[k].style.display='block'; }
  function showError(msg){ show('error'); document.getElementById('error-detail').textContent = msg; }

  // SG 클라이언트 준비 대기 (session.js, supabase-client.js 초기화)
  async function waitForSG(timeout=4000){
    const t0 = Date.now();
    while (!(window.SG && window.SG.session && window.SG.supabase)) {
      if (Date.now() - t0 > timeout) throw new Error('Supabase 초기화 실패');
      await new Promise(r => setTimeout(r, 50));
    }
  }

  try { await waitForSG(); } catch(e) { showError('시스템 초기화 실패 — 잠시 후 다시 시도해주세요.'); return; }

  // URL에 session+email이 모두 있으면 (내 세션에서 왔을 때) 바로 paid 확인
  if (sessionIdParam && emailParam) {
    try {
      const { session } = await SG.session.getSessionById(sessionIdParam);
      if (session && session.payment_status === 'paid') {
        return await doDownloadAndRender(session, emailParam);
      }
    } catch(_){}
  }

  // 이메일 입력 화면 기본 (localStorage 자동 paid 처리는 하지 않음)
  show('input');
  const $email = document.getElementById('email');
  const $btn = document.getElementById('btn-get');
  const $err = document.getElementById('err');

  // 이메일 프리필 (URL > localStorage 순)
  let prefillEmail = emailParam;
  if (!prefillEmail) {
    try { prefillEmail = localStorage.getItem('sg_last_email'); } catch(_){}
  }
  if (prefillEmail) $email.value = prefillEmail;

  $btn.addEventListener('click', async () => {
    $err.style.display = 'none';
    const email = $email.value.trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      $err.textContent = '이메일 형식이 올바르지 않아요.';
      $err.style.display = 'block';
      return;
    }

    $btn.disabled = true;
    $btn.textContent = '확인 중...';

    try {
      // 1) 해당 이메일로 세션 목록 조회
      const items = await SG.session.findSessionsByEmail(email);
      console.log('[SG] findSessionsByEmail(', email, ') →', items);
      if (!items || items.length === 0) {
        throw new Error('이 이메일로 검사한 세션을 찾지 못했어요.\n\n검사 시 입력한 이메일이 맞는지 확인해주세요.');
      }

      // 2) 다운로드 대상 세션 선택
      //    우선순위:
      //      (a) URL에 sessionIdParam 명시되어 있으면 그것
      //      (b) combo 있는 세션 중 '가장 최근' (결제 상태 무관)
      //          — 래피드가 세션ID를 모르므로, 사용자가 방금 검사한 최신 세션 = 이번 결제 대상
      //          — 이미 paid면 그대로 다운로드, unpaid/both_done이면 곧 paid 마킹됨
      //      (c) combo 없는 fallback (awaiting_partner 등) — 거의 안 씀
      //    target을 item(세션+db_email)로 잡아서 DB 원본 이메일을 써서 마킹하자 (대소문자 불일치 회피)
      let targetItem = null;
      if (sessionIdParam) {
        const hit = items.find(x => x.session && x.session.id === sessionIdParam);
        if (hit) targetItem = hit;
      }
      if (!targetItem) {
        // combo가 확정된 세션 중 created_at 내림차순 최신
        const combos = items
          .filter(x => x.session && x.session.combo)
          .sort((a,b) => new Date(b.session.created_at) - new Date(a.session.created_at));
        targetItem = combos[0];
      }
      // 그래도 없으면 아무 세션이라도 (최신) — 검사 미완료 상태일 수 있음
      if (!targetItem && items.length > 0) {
        targetItem = items
          .slice()
          .sort((a,b) => new Date(b.session.created_at) - new Date(a.session.created_at))[0];
      }

      if (!targetItem) {
        throw new Error('다운로드 가능한 세션이 없어요.\n\n파트너가 아직 검사를 완료하지 않았거나, 조합이 확정되지 않았어요.');
      }

      let target = targetItem.session;
      const dbEmail = targetItem.db_email || email; // DB 원본 이메일 우선
      console.log('[SG] target session →', target, 'db_email →', dbEmail);

      // 3) 결제 마킹 (이미 paid면 no-op, 아니면 paid로 표시)
      if (target.payment_status !== 'paid') {
        console.log('[SG] markPaidByEmail call →', { session_id: target.id, email: dbEmail, input_email: email });
        try {
          const mpResp = await SG.session.markPaidByEmail(target.id, dbEmail);
          console.log('[SG] markPaidByEmail OK →', mpResp);
        } catch (e) {
          console.error('[SG] markPaidByEmail FAIL →', e);
          // 원본 이메일로도 실패하면, 입력한 이메일로 한 번 더 시도 (fallback)
          if (dbEmail !== email) {
            try {
              const mpResp2 = await SG.session.markPaidByEmail(target.id, email);
              console.log('[SG] markPaidByEmail retry with input OK →', mpResp2);
            } catch (e2) {
              console.error('[SG] markPaidByEmail retry FAIL →', e2);
              throw new Error('결제 확인에 실패했어요.\n' + (e2.message || e.message || '') + '\n\n세션ID: ' + target.id + '\nDB이메일: ' + dbEmail + '\n입력: ' + email);
            }
          } else {
            throw new Error('결제 확인에 실패했어요.\n' + (e.message || '') + '\n\n세션ID: ' + target.id + '\n이메일: ' + dbEmail);
          }
        }
        // 다시 조회해서 최신화
        const r2 = await SG.session.getSessionById(target.id);
        if (r2.session) target = r2.session;
      }

      if (target.payment_status !== 'paid') {
        throw new Error('결제 상태를 확인하지 못했어요. 잠시 후 다시 시도해주세요.');
      }

      // 4) 다운로드 진행 (requestDownloadUrl은 ilike라 입력 이메일로 충분)
      await doDownloadAndRender(target, email);
    } catch (e) {
      console.error(e);
      $err.textContent = '⚠️ ' + (e.message || '오류가 발생했어요');
      $err.style.display = 'block';
    } finally {
      $btn.disabled = false;
      $btn.textContent = '📥 리포트 받기';
    }
  });

  // 화면 전환 + 자동 다운로드
  async function doDownloadAndRender(sess, mail){
    show('paid');
    const comboText = (sess.combo || '—').replace('_',' × ');
    document.getElementById('combo-display').textContent = comboText;

    const doDl = async () => {
      const $e = document.getElementById('err-paid');
      $e.style.display = 'none';
      try {
        const resp = await SG.session.requestDownloadUrl(sess.id, mail);
        const a = document.createElement('a');
        a.href = resp.url;
        a.download = resp.filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (e) {
        console.error(e);
        $e.textContent = '⚠️ ' + (e.message || '다운로드 실패');
        $e.style.display = 'block';
      }
    };

    document.getElementById('btn-redownload').addEventListener('click', doDl);
    // localStorage 정리 (session은 지우되 email은 /my/ 편의상 유지)
    try {
      localStorage.removeItem('sg_last_session');
      localStorage.removeItem('sg_last_combo');
      localStorage.setItem('sg_last_email', mail); // /my/에서 자동 프리필
    } catch(_){}
    // 자동 다운로드 1회
    setTimeout(doDl, 700);
  }
})();
</script>
</body>
</html>
