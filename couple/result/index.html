<title>커플 유형 결과 — 42world</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0F121E; --card:#1A2030;
  --gold:#B8860B; --gold-l:#D4A017;
  --silver:#8899AA; --text:#E8E4DC;
  --border:rgba(184,134,11,0.2);
}
body { font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; background:rgba(15,18,30,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:99; }
.nav a { color:var(--gold-l); font-weight:900; font-size:17px; text-decoration:none; }

.wrap { max-width:560px; margin:0 auto; padding:40px 20px 80px; }

/* header */
.result-head { text-align:center; margin-bottom:36px; }
.chips { display:inline-flex; gap:8px; margin-bottom:16px; }
.chip { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:rgba(184,134,11,0.12); border:1px solid var(--border); color:var(--gold-l); }
.r-title { font-size:28px; font-weight:900; color:#fff; margin-bottom:6px; }
.r-sub { font-size:15px; color:var(--gold-l); font-weight:700; margin-bottom:12px; }
.r-hook { font-size:14px; color:rgba(232,228,220,0.7); line-height:1.8; }

/* cards */
.cards-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:28px 0; }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 16px; }
.card-ico { font-size:24px; margin-bottom:8px; }
.card-lbl { font-size:11px; font-weight:700; color:var(--silver); letter-spacing:1px; margin-bottom:6px; }
.card-txt { font-size:13px; color:rgba(232,228,220,0.85); line-height:1.65; }

/* preview section */
.preview-block { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:24px; }
.preview-block h3 { font-size:13px; font-weight:700; color:var(--silver); letter-spacing:1px; margin-bottom:14px; }
.preview-block p { font-size:14px; color:rgba(232,228,220,0.75); line-height:1.8; }
.blur-wrap { position:relative; margin-top:12px; }
.blur-txt { font-size:14px; color:rgba(232,228,220,0.6); line-height:1.8; filter:blur(5px); user-select:none; }
.blur-over { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(15,18,30,0.6); border-radius:10px; }
.blur-over span { font-size:13px; color:var(--silver); margin-bottom:10px; }

/* CTA */
.cta-box { background:rgba(184,134,11,0.07); border:1px solid var(--border); border-radius:16px; padding:28px 20px; text-align:center; margin-bottom:16px; }
.cta-box h2 { font-size:18px; font-weight:900; color:#fff; margin-bottom:8px; }
.cta-box p { font-size:13px; color:var(--silver); line-height:1.7; margin-bottom:20px; }
.cta-price { font-size:22px; font-weight:900; color:var(--gold-l); margin-bottom:4px; }
.cta-price s { font-size:14px; color:var(--silver); margin-right:8px; }
.cta-price-note { font-size:11px; color:var(--silver); margin-bottom:20px; }
.btn-buy { display:block; padding:17px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:13px; color:#0F121E; font-size:16px; font-weight:900; text-decoration:none; cursor:pointer; transition:opacity .2s; }
.btn-buy:hover { opacity:.85; }
.btn-retry { display:block; padding:13px; background:rgba(184,134,11,0.07); border:1px solid var(--border); border-radius:11px; color:var(--silver); font-size:14px; font-weight:700; text-decoration:none; cursor:pointer; transition:color .2s; text-align:center; margin-top:10px; }
.btn-retry:hover { color:var(--gold-l); }

/* footer */
footer { border-top:1px solid var(--border); padding:28px 20px; text-align:center; }
.footer-links { display:flex; justify-content:center; flex-wrap:wrap; gap:14px; margin-bottom:12px; }
.footer-links a { font-size:12px; color:var(--silver); text-decoration:none; }
.footer-links a:hover { color:var(--gold-l); }
.footer-biz { font-size:11px; color:rgba(136,153,170,0.5); line-height:1.8; }

#loading { text-align:center; padding:80px 20px; color:var(--silver); }
</style>
