    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;

let currentGroup = 'all';
let currentSearch = '';

function setGroup(g, btn) {
  currentGroup = g;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  currentSearch = document.getElementById('search-input').value.trim().toLowerCase();
  render();
}

function render() {
  const wrap = document.getElementById('list-wrap');
  wrap.innerHTML = '';
  let total = 0;

  TYPES.forEach(grp => {
    if (currentGroup !== 'all' && currentGroup !== grp) return;

    const items = DATA.filter(d => {
      if (!d.key.startsWith(grp + '_')) return false;
      if (!currentSearch) return true;
      return (d.combo + d.drama + d.actors + d.key).toLowerCase().includes(currentSearch);
    });

    if (items.length === 0) return;
    total += items.length;

    // 그룹 헤더
    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <span class="group-badge">${grp}</span>
      <span class="group-label">${TYPE_KR[grp]}형</span>
      <span class="group-count">${items.length}종</span>
    `;
    wrap.appendChild(header);

    // 아이템들
    items.forEach(d => {
      const [t1, t2] = d.key.split('_');
      const url = '/couple/result/?a=' + t1 + '&b=' + t2;
      const a = document.createElement('a');
      a.className = 'item';
      a.href = url;
      a.innerHTML = `
        <div class="item-left">
          <div class="item-types">
            <span class="type-badge">${t1}</span>
            <span class="type-x">×</span>
            <span class="type-badge">${t2}</span>
          </div>
          <div class="item-combo">${d.combo}</div>
          <div class="item-drama">🎬 <span class="drama-title">${d.drama}</span> &nbsp;·&nbsp; ${d.actors}</div>
        </div>
        <span class="item-arrow">›</span>
      `;
      wrap.appendChild(a);
    });
  });

  // 검색 결과 없음
  if (total === 0) {
    wrap.innerHTML = '<div class="empty-msg">검색 결과가 없어요 🔍<br><small style="color:#445;margin-top:8px;display:block;">' + currentSearch + '</small></div>';
  }
  document.getElementById('result-count').textContent = total + '종';
}

render();
</script>
